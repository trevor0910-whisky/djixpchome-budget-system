<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PChome DJI 獎勵金收支管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans relative">

    <nav class="bg-blue-800 p-4 shadow-md">
        <div class="container mx-auto flex items-center justify-between">
            <div class="text-white font-bold text-xl tracking-wider"><i class="fas fa-camera mr-2"></i>PChome DJI 獎勵金收支管理系統 <span class="text-xs bg-yellow-400 text-blue-900 px-2 py-1 rounded ml-2">V3</span></div>
            <div class="text-white text-sm bg-blue-700 py-1 px-3 rounded-full">PM: 泓毅 (Trevor)</div>
        </div>
    </nav>

    <div class="container mx-auto my-6 px-4">
        
        <div class="flex justify-end mb-6 space-x-3">
            <button onclick="exportData()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-4 rounded shadow transition-colors"><i class="fas fa-file-export mr-2"></i>匯出備份 (交接用)</button>
            <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
            <button onclick="document.getElementById('importFile').click()" class="bg-amber-500 hover:bg-amber-600 text-white font-bold py-2 px-4 rounded shadow transition-colors"><i class="fas fa-file-import mr-2"></i>匯入資料</button>
            <button onclick="clearData()" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded shadow transition-colors"><i class="fas fa-trash-alt mr-2"></i>清除資料</button>
        </div>

        <div class="bg-white rounded-xl p-4 shadow-sm mb-6 flex flex-wrap gap-4 items-center border-l-4 border-indigo-500">
            <span class="font-bold text-gray-700"><i class="fas fa-filter mr-2"></i>全站資料篩選：</span>
            <select id="yearFilter" onchange="renderApp()" class="border border-gray-300 rounded py-2 px-3 text-gray-700 bg-gray-50 outline-none font-bold">
                <option value="all">全部年份</option>
            </select>
            <select id="picFilter" onchange="renderApp()" class="border border-gray-300 rounded py-2 px-3 text-gray-700 bg-gray-50 outline-none font-bold">
                <option value="all">所有經辦人</option>
            </select>
            <span class="text-xs text-gray-400 ml-auto">提示：篩選結果會連動下方所有的卡片與圖表</span>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white rounded-xl p-6 shadow-sm border-l-4 border-blue-500">
                <h3 class="text-gray-500 text-sm font-bold mb-1">總收入 (Q1-Q4 獎勵金)</h3>
                <p class="text-3xl font-black text-gray-800" id="totalIncome">$0</p>
            </div>
            <div class="bg-white rounded-xl p-6 shadow-sm border-l-4 border-red-500">
                <h3 class="text-gray-500 text-sm font-bold mb-1">總支出 (行銷總額)</h3>
                <p class="text-3xl font-black text-gray-800" id="totalExpense">$0</p>
            </div>
            <div class="bg-white rounded-xl p-6 shadow-sm border-l-4 border-emerald-500">
                <h3 class="text-gray-500 text-sm font-bold mb-1">可用結餘</h3>
                <p class="text-3xl font-black text-emerald-600" id="balance">$0</p>
            </div>
            <div class="bg-white rounded-xl p-6 shadow-sm border-l-4 border-purple-500">
                <h3 class="text-gray-500 text-sm font-bold mb-1">預算使用率</h3>
                <p class="text-3xl font-black text-gray-800" id="usageRate">0%</p>
                <div class="w-full bg-gray-200 rounded-full h-2 mt-3">
                    <div class="bg-purple-500 h-2 rounded-full" id="usageProgressBar" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl p-6 shadow-sm mb-8 border-t-4 border-purple-500">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 class="text-lg font-bold text-gray-800"><i class="fas fa-layer-group mr-2 text-purple-500"></i>週期性支出類別分析 (堆疊圖)</h3>
                <select id="timeScaleFilter" onchange="renderApp()" class="border border-purple-300 text-purple-700 rounded py-1 px-3 bg-purple-50 outline-none font-bold">
                    <option value="monthly">每月支出分析</option>
                    <option value="quarterly">每季支出分析</option>
                </select>
            </div>
            <canvas id="periodicCategoryChart" height="80"></canvas>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-white rounded-xl p-6 shadow-sm">
                <h3 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2"><i class="fas fa-chart-bar mr-2 text-blue-500"></i>月度收支總額趨勢</h3>
                <canvas id="monthlyChart" height="250"></canvas>
            </div>
            <div class="bg-white rounded-xl p-6 shadow-sm">
                <h3 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2"><i class="fas fa-chart-pie mr-2 text-red-500"></i>總行銷費用類別佔比</h3>
                <div class="w-full max-w-xs mx-auto">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white rounded-xl p-6 shadow-sm lg:col-span-1 h-fit border-t-4 border-gray-800">
                <h3 class="text-lg font-bold text-gray-800 mb-4"><i class="fas fa-plus-circle mr-2"></i>新增收支紀錄</h3>
                <form id="recordForm" onsubmit="addRecord(event)">
                    <div class="mb-3">
                        <label class="block text-gray-700 text-sm font-bold mb-1">發生日期</label>
                        <input type="date" id="dateInput" class="border border-gray-300 rounded w-full py-2 px-3 text-gray-700 focus:ring focus:ring-blue-200 outline-none" required>
                    </div>
                    <div class="mb-3">
                        <label class="block text-gray-700 text-sm font-bold mb-1">經辦人</label>
                        <input type="text" id="picInput" value="泓毅" class="border border-gray-300 rounded w-full py-2 px-3 text-gray-700 focus:ring outline-none" required>
                    </div>
                    <div class="mb-3">
                        <label class="block text-gray-700 text-sm font-bold mb-1">收支名目</label>
                        <input type="text" id="descInput" placeholder="例如: 雙11站內活動" class="border border-gray-300 rounded w-full py-2 px-3 text-gray-700 focus:ring outline-none" required>
                    </div>
                    <div class="mb-3">
                        <label class="block text-gray-700 text-sm font-bold mb-1">費用類別</label>
                        <select id="categoryInput" class="border border-gray-300 rounded w-full py-2 px-3 text-gray-700 focus:ring outline-none" required>
                            <option value="站外行銷">站外廣告行銷 (支出)</option>
                            <option value="站內行銷">站內行銷活動 (支出)</option>
                            <option value="折價回饋">折價回饋 (支出)</option>
                            <option value="獎勵金">DJI 獎勵金 (收入)</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="mb-4 flex space-x-3">
                        <div class="w-1/3">
                            <label class="block text-gray-700 text-sm font-bold mb-1">類型</label>
                            <select id="typeInput" class="border border-gray-300 bg-gray-100 rounded w-full py-2 px-3 text-gray-700 outline-none">
                                <option value="expense" selected>支出</option>
                                <option value="income">收入</option>
                            </select>
                        </div>
                        <div class="w-2/3">
                            <label class="block text-gray-700 text-sm font-bold mb-1">金額 (NT$)</label>
                            <input type="number" id="amountInput" min="0" placeholder="0" class="border border-gray-300 rounded w-full py-2 px-3 text-gray-700 focus:ring outline-none" required>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-blue-800 hover:bg-blue-900 text-white font-bold py-3 px-4 rounded shadow-md transition-colors">
                        送出紀錄
                    </button>
                </form>
            </div>

            <div class="bg-white rounded-xl p-0 shadow-sm lg:col-span-2 overflow-hidden border-t-4 border-gray-200">
                <div class="p-6 border-b">
                    <h3 class="text-lg font-bold text-gray-800"><i class="fas fa-list mr-2"></i>目前篩選下的收支明細</h3>
                </div>
                <div class="overflow-x-auto max-h-[500px] overflow-y-auto">
                    <table class="min-w-full bg-white relative">
                        <thead class="bg-gray-100 text-gray-600 sticky top-0 shadow-sm z-10">
                            <tr>
                                <th class="py-3 px-3 text-left font-bold text-sm">日期</th>
                                <th class="py-3 px-3 text-left font-bold text-sm">經辦人</th>
                                <th class="py-3 px-3 text-left font-bold text-sm">名目</th>
                                <th class="py-3 px-3 text-center font-bold text-sm">類別</th>
                                <th class="py-3 px-3 text-right font-bold text-sm text-blue-600">收入</th>
                                <th class="py-3 px-3 text-right font-bold text-sm text-red-500">支出</th>
                                <th class="py-3 px-3 text-center font-bold text-sm">操作</th>
                            </tr>
                        </thead>
                        <tbody id="recordTableBody" class="text-gray-700 text-sm divide-y">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="editModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 transition-opacity">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md mx-4 overflow-hidden transform transition-all">
            <div class="bg-blue-800 p-4 flex justify-between items-center">
                <h3 class="text-white font-bold text-lg"><i class="fas fa-edit mr-2"></i>編輯紀錄</h3>
                <button onclick="closeEditModal()" class="text-white hover:text-gray-200"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form id="editForm" onsubmit="saveEditRecord(event)" class="p-6">
                <input type="hidden" id="editId">
                <div class="mb-3">
                    <label class="block text-gray-700 text-sm font-bold mb-1">發生日期</label>
                    <input type="date" id="editDate" class="border border-gray-300 rounded w-full py-2 px-3 text-gray-700 focus:ring outline-none" required>
                </div>
                <div class="mb-3">
                    <label class="block text-gray-700 text-sm font-bold mb-1">經辦人</label>
                    <input type="text" id="editPic" class="border border-gray-300 rounded w-full py-2 px-3 text-gray-700 focus:ring outline-none" required>
                </div>
                <div class="mb-3">
                    <label class="block text-gray-700 text-sm font-bold mb-1">收支名目</label>
                    <input type="text" id="editDesc" class="border border-gray-300 rounded w-full py-2 px-3 text-gray-700 focus:ring outline-none" required>
                </div>
                <div class="mb-3">
                    <label class="block text-gray-700 text-sm font-bold mb-1">費用類別</label>
                    <select id="editCategory" class="border border-gray-300 rounded w-full py-2 px-3 text-gray-700 focus:ring outline-none" required>
                        <option value="站外行銷">站外廣告行銷 (支出)</option>
                        <option value="站內行銷">站內行銷活動 (支出)</option>
                        <option value="折價回饋">折價回饋 (支出)</option>
                        <option value="獎勵金">DJI 獎勵金 (收入)</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="mb-5 flex space-x-3">
                    <div class="w-1/3">
                        <label class="block text-gray-700 text-sm font-bold mb-1">類型</label>
                        <select id="editType" class="border border-gray-300 bg-gray-100 rounded w-full py-2 px-3 text-gray-700 outline-none">
                            <option value="expense">支出</option>
                            <option value="income">收入</option>
                        </select>
                    </div>
                    <div class="w-2/3">
                        <label class="block text-gray-700 text-sm font-bold mb-1">金額 (NT$)</label>
                        <input type="number" id="editAmount" min="0" class="border border-gray-300 rounded w-full py-2 px-3 text-gray-700 focus:ring outline-none" required>
                    </div>
                </div>
                <div class="flex space-x-3 justify-end">
                    <button type="button" onclick="closeEditModal()" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded transition-colors">取消</button>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded shadow-md transition-colors">儲存變更</button>
                </div>
            </form>
        </div>
    </div>

<script>
// 初始化歷史資料
const defaultData = [
  {"id": 1, "date": "2025-01-09", "pic": "系統", "desc": "202409-12_Q4_DJI銷獎", "category": "獎勵金", "type": "income", "amount": 2130930},
  {"id": 2, "date": "2025-02-03", "pic": "泓毅", "desc": "FLIP新機-RS廣告", "category": "站外行銷", "type": "expense", "amount": 100000},
  {"id": 3, "date": "2025-02-03", "pic": "泓毅", "desc": "DJI-1月包套", "category": "站內行銷", "type": "expense", "amount": 50000},
  {"id": 4, "date": "2025-02-26", "pic": "泓毅", "desc": "2/8-2/28 送1000P幣", "category": "折價回饋", "type": "expense", "amount": 89000},
  {"id": 5, "date": "2025-02-26", "pic": "泓毅", "desc": "2/8-2/28 送1000P幣", "category": "折價回饋", "type": "expense", "amount": 40000},
  {"id": 6, "date": "2025-03-26", "pic": "恬瑜", "desc": "2/8-2/28 送1000P幣", "category": "折價回饋", "type": "expense", "amount": 91000},
  {"id": 7, "date": "2025-03-26", "pic": "泓毅", "desc": "3/10-3/31 送1000P幣", "category": "折價回饋", "type": "expense", "amount": 50000},
  {"id": 8, "date": "2025-04-08", "pic": "系統", "desc": "2025_Q1_DJI銷獎", "category": "獎勵金", "type": "income", "amount": 464897},
  {"id": 9, "date": "2025-04-26", "pic": "泓毅", "desc": "滿1萬登記送1000P幣", "category": "折價回饋", "type": "expense", "amount": 80000},
  {"id": 10, "date": "2025-05-26", "pic": "泓毅", "desc": "滿3000登記抽Omron體脂計", "category": "站內行銷", "type": "expense", "amount": 126000},
  {"id": 11, "date": "2025-06-26", "pic": "恬瑜", "desc": "6/9-6/19 滿萬送618P幣", "category": "折價回饋", "type": "expense", "amount": 150792},
  {"id": 12, "date": "2025-06-26", "pic": "泓毅", "desc": "618包套", "category": "站內行銷", "type": "expense", "amount": 250000},
  {"id": 13, "date": "2025-07-11", "pic": "系統", "desc": "2025_Q2_DJI銷獎", "category": "獎勵金", "type": "income", "amount": 932434},
  {"id": 14, "date": "2025-09-26", "pic": "泓毅", "desc": "99購物節包套-星座包", "category": "站內行銷", "type": "expense", "amount": 100000},
  {"id": 15, "date": "2025-10-03", "pic": "系統", "desc": "2025_Q3_DJI銷獎", "category": "獎勵金", "type": "income", "amount": 349789},
  {"id": 16, "date": "2025-11-26", "pic": "雁平", "desc": "雙11包套", "category": "站內行銷", "type": "expense", "amount": 200000},
  {"id": 17, "date": "2026-01-23", "pic": "系統", "desc": "2025_Q4_DJI銷獎", "category": "獎勵金", "type": "income", "amount": 798893},
  {"id": 18, "date": "2026-03-26", "pic": "泓毅", "desc": "03月Google PfM DJI", "category": "站外行銷", "type": "expense", "amount": 50000}
];

let records = JSON.parse(localStorage.getItem('djiLedgerData')) || defaultData;
let chartInstanceMonthly = null;
let chartInstanceCategory = null;
let chartInstancePeriodic = null;

// 定義統一的圖表顏色
const colorMap = {
    '站外行銷': '#ef4444', // Red
    '站內行銷': '#f59e0b', // Amber
    '折價回饋': '#10b981', // Emerald
    '獎勵金': '#3b82f6',   // Blue
    '其他': '#8b5cf6'      // Purple
};

// 格式化金錢
const formatCurrency = (num) => new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', minimumFractionDigits: 0 }).format(num);

// 類別連動收支 (新增區)
document.getElementById('categoryInput').addEventListener('change', function() {
    const typeSelect = document.getElementById('typeInput');
    typeSelect.value = (this.value === '獎勵金') ? 'income' : 'expense';
});

// 類別連動收支 (編輯區)
document.getElementById('editCategory').addEventListener('change', function() {
    const typeSelect = document.getElementById('editType');
    typeSelect.value = (this.value === '獎勵金') ? 'income' : 'expense';
});

// 新增紀錄
function addRecord(e) {
    e.preventDefault();
    const newRecord = {
        id: Date.now(),
        date: document.getElementById('dateInput').value,
        pic: document.getElementById('picInput').value,
        desc: document.getElementById('descInput').value,
        category: document.getElementById('categoryInput').value,
        type: document.getElementById('typeInput').value,
        amount: parseInt(document.getElementById('amountInput').value, 10)
    };
    records.push(newRecord);
    saveData();
    document.getElementById('recordForm').reset();
    document.getElementById('picInput').value = "泓毅"; 
    updateFilterOptions();
    renderApp();
}

// 開啟編輯 Modal
function openEditModal(id) {
    const record = records.find(r => r.id === id);
    if (!record) return;
    
    document.getElementById('editId').value = record.id;
    document.getElementById('editDate').value = record.date;
    document.getElementById('editPic').value = record.pic;
    document.getElementById('editDesc').value = record.desc;
    document.getElementById('editCategory').value = record.category;
    document.getElementById('editType').value = record.type;
    document.getElementById('editAmount').value = record.amount;
    
    document.getElementById('editModal').classList.remove('hidden');
}

// 關閉編輯 Modal
function closeEditModal() {
    document.getElementById('editModal').classList.add('hidden');
}

// 儲存編輯結果
function saveEditRecord(e) {
    e.preventDefault();
    const id = parseInt(document.getElementById('editId').value, 10);
    const index = records.findIndex(r => r.id === id);
    
    if (index !== -1) {
        records[index] = {
            id: id,
            date: document.getElementById('editDate').value,
            pic: document.getElementById('editPic').value,
            desc: document.getElementById('editDesc').value,
            category: document.getElementById('editCategory').value,
            type: document.getElementById('editType').value,
            amount: parseInt(document.getElementById('editAmount').value, 10)
        };
        saveData();
        closeEditModal();
        updateFilterOptions();
        renderApp();
    }
}

// 刪除紀錄
function deleteRecord(id) {
    if(confirm('確定要刪除這筆紀錄嗎？')) {
        records = records.filter(r => r.id !== id);
        saveData();
        updateFilterOptions();
        renderApp();
    }
}

// 存入 LocalStorage
function saveData() {
    localStorage.setItem('djiLedgerData', JSON.stringify(records));
}

// 匯出 JSON
function exportData() {
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(records));
    const downloadAnchorNode = document.createElement('a');
    downloadAnchorNode.setAttribute("href", dataStr);
    downloadAnchorNode.setAttribute("download", "DJI_獎勵金收支紀錄_" + new Date().toISOString().slice(0,10) + ".json");
    document.body.appendChild(downloadAnchorNode);
    downloadAnchorNode.click();
    downloadAnchorNode.remove();
}

// 匯入 JSON
function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const imported = JSON.parse(e.target.result);
            records = imported;
            saveData();
            updateFilterOptions();
            renderApp();
            alert('資料匯入成功！');
        } catch (err) {
            alert('檔案格式錯誤！');
        }
    };
    reader.readAsText(file);
}

function clearData(){
    if(confirm('確定要清除所有資料嗎？(此動作無法復原)')){
        records = [];
        saveData();
        updateFilterOptions();
        renderApp();
    }
}

// 轉換日期為季度
function getQuarter(dateString) {
    const date = new Date(dateString);
    const year = date.getFullYear();
    const q = Math.floor(date.getMonth() / 3) + 1;
    return `${year}-Q${q}`;
}

// 更新篩選器選單內容
function updateFilterOptions() {
    const yearSet = new Set(records.map(r => r.date.substring(0,4)));
    const filterSelect = document.getElementById('yearFilter');
    const currentYearFilter = filterSelect.value;
    filterSelect.innerHTML = '<option value="all">全部年份</option>';
    Array.from(yearSet).sort().reverse().forEach(year => {
        filterSelect.innerHTML += `<option value="${year}" ${currentYearFilter===year?'selected':''}>${year}年</option>`;
    });

    const picSet = new Set(records.map(r => r.pic));
    const picSelect = document.getElementById('picFilter');
    const currentPicFilter = picSelect.value;
    picSelect.innerHTML = '<option value="all">所有經辦人</option>';
    Array.from(picSet).sort().forEach(pic => {
        picSelect.innerHTML += `<option value="${pic}" ${currentPicFilter===pic?'selected':''}>${pic}</option>`;
    });
}

// 更新系統介面
function renderApp() {
    records.sort((a, b) => new Date(b.date) - new Date(a.date)); 

    const yearFilterVal = document.getElementById('yearFilter').value;
    const picFilterVal = document.getElementById('picFilter').value;
    const timeScale = document.getElementById('timeScaleFilter').value;

    const filteredRecords = records.filter(r => {
        const matchYear = (yearFilterVal === 'all') || r.date.startsWith(yearFilterVal);
        const matchPic = (picFilterVal === 'all') || r.pic === picFilterVal;
        return matchYear && matchPic;
    });

    let totalIn = 0, totalOut = 0;
    const categoryTotals = {};
    const monthlyData = {};
    const periodicExpenseData = {}; 
    const expenseCategoriesSet = new Set();

    filteredRecords.forEach(r => {
        const month = r.date.substring(0,7); 
        if (!monthlyData[month]) monthlyData[month] = { income: 0, expense: 0 };
        
        const periodKey = (timeScale === 'monthly') ? month : getQuarter(r.date);
        if (!periodicExpenseData[periodKey]) periodicExpenseData[periodKey] = {};

        if (r.type === 'income') {
            totalIn += r.amount;
            monthlyData[month].income += r.amount;
        } else {
            totalOut += r.amount;
            monthlyData[month].expense += r.amount;
            categoryTotals[r.category] = (categoryTotals[r.category] || 0) + r.amount;
            periodicExpenseData[periodKey][r.category] = (periodicExpenseData[periodKey][r.category] || 0) + r.amount;
            expenseCategoriesSet.add(r.category);
        }
    });

    const balance = totalIn - totalOut;
    const usagePercent = totalIn > 0 ? ((totalOut / totalIn) * 100).toFixed(1) : (totalOut > 0 ? 100 : 0);

    document.getElementById('totalIncome').innerText = formatCurrency(totalIn);
    document.getElementById('totalExpense').innerText = formatCurrency(totalOut);
    document.getElementById('balance').innerText = formatCurrency(balance);
    document.getElementById('usageRate').innerText = usagePercent + '%';
    document.getElementById('usageProgressBar').style.width = Math.min(usagePercent, 100) + '%';

    // 渲染明細表格 (新增編輯按鈕)
    const tbody = document.getElementById('recordTableBody');
    tbody.innerHTML = '';
    filteredRecords.forEach(r => {
        const isInc = r.type === 'income';
        tbody.innerHTML += `
            <tr class="hover:bg-blue-50 transition-colors">
                <td class="py-2 px-3">${r.date}</td>
                <td class="py-2 px-3 font-medium text-gray-800">${r.pic}</td>
                <td class="py-2 px-3">${r.desc}</td>
                <td class="py-2 px-3 text-center"><span class="px-2 py-1 rounded-md text-xs font-bold ${isInc ? 'bg-blue-100 text-blue-700' : 'bg-gray-100 text-gray-700'}">${r.category}</span></td>
                <td class="py-2 px-3 text-right font-bold text-blue-600">${isInc ? formatCurrency(r.amount) : '-'}</td>
                <td class="py-2 px-3 text-right font-bold text-red-500">${!isInc ? formatCurrency(r.amount) : '-'}</td>
                <td class="py-2 px-3 text-center space-x-2">
                    <button onclick="openEditModal(${r.id})" class="text-blue-500 hover:text-blue-700 transition-colors" title="編輯"><i class="fas fa-edit"></i></button>
                    <button onclick="deleteRecord(${r.id})" class="text-red-400 hover:text-red-600 transition-colors" title="刪除"><i class="fas fa-trash"></i></button>
                </td>
            </tr>
        `;
    });

    // ------------------------------------
    // 圖表 1: 月度收支總額趨勢 (基礎圖)
    // ------------------------------------
    const sortedMonths = Object.keys(monthlyData).sort();
    const inData = sortedMonths.map(m => monthlyData[m].income);
    const exData = sortedMonths.map(m => monthlyData[m].expense);
    
    if (chartInstanceMonthly) chartInstanceMonthly.destroy();
    const ctxMonthly = document.getElementById('monthlyChart').getContext('2d');
    chartInstanceMonthly = new Chart(ctxMonthly, {
        type: 'bar',
        data: {
            labels: sortedMonths,
            datasets: [
                { label: '收入', data: inData, backgroundColor: '#3b82f6', borderRadius: 4 },
                { label: '支出', data: exData, backgroundColor: '#ef4444', borderRadius: 4 }
            ]
        },
        options: { responsive: true, scales: { y: { beginAtZero: true } } }
    });

    // ------------------------------------
    // 圖表 2: 總行銷費用類別佔比 (圓餅圖)
    // ------------------------------------
    const catLabels = Object.keys(categoryTotals);
    const catBgColors = catLabels.map(cat => colorMap[cat] || '#cbd5e1'); 
    
    if (chartInstanceCategory) chartInstanceCategory.destroy();
    const ctxCat = document.getElementById('categoryChart').getContext('2d');
    chartInstanceCategory = new Chart(ctxCat, {
        type: 'doughnut',
        data: {
            labels: catLabels,
            datasets: [{
                data: Object.values(categoryTotals),
                backgroundColor: catBgColors,
                hoverOffset: 4
            }]
        },
        options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
    });

    // ------------------------------------
    // 圖表 3: 週期性支出類別分析 (堆疊長條圖)
    // ------------------------------------
    const sortedPeriods = Object.keys(periodicExpenseData).sort(); 
    const expenseCategoriesArr = Array.from(expenseCategoriesSet); 
    
    const periodicDatasets = expenseCategoriesArr.map(cat => {
        return {
            label: cat,
            data: sortedPeriods.map(period => periodicExpenseData[period][cat] || 0),
            backgroundColor: colorMap[cat] || '#cbd5e1'
        };
    });

    if (chartInstancePeriodic) chartInstancePeriodic.destroy();
    const ctxPeriodic = document.getElementById('periodicCategoryChart').getContext('2d');
    chartInstancePeriodic = new Chart(ctxPeriodic, {
        type: 'bar',
        data: {
            labels: sortedPeriods,
            datasets: periodicDatasets
        },
        options: {
            responsive: true,
            scales: {
                x: { stacked: true },
                y: { stacked: true, beginAtZero: true }
            },
            plugins: {
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            let label = context.dataset.label || '';
                            if (label) { label += ': '; }
                            if (context.parsed.y !== null) {
                                label += new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', minimumFractionDigits: 0 }).format(context.parsed.y);
                            }
                            return label;
                        }
                    }
                }
            }
        }
    });
}

// 初次載入
window.onload = function() {
    updateFilterOptions();
    renderApp();
};
</script>
</body>
</html>
